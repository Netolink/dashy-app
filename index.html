<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דשבורד כלים דיגיטליים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        cardBg: '#1e293b',
                        accentBlue: '#0ea5e9',
                        accentPurple: '#a855f7'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-darkBg text-slate-100 min-h-screen font-sans antialiased overflow-x-hidden">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-accentBlue to-accentPurple bg-clip-text text-transparent">
                כלים דיגיטליים באתר
            </h1>
            <div id="dashboards-tabs-container" class="flex items-center gap-2 overflow-x-auto max-w-full py-1">
                </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="flex flex-col items-center mb-8 text-center">
            <div class="flex items-center gap-3 bg-slate-900/60 px-6 py-3 rounded-full border border-slate-800 shadow-xl">
                <span id="active-dash-icon" class="text-xl">🚀</span>
                <h2 id="active-dash-title" class="text-xl font-semibold text-white">דשבורד ראשי</h2>
                <button id="btn-edit-dash" class="text-slate-400 hover:text-accentBlue transition-colors text-sm" title="ערוך שם ואימוג'י לדשבורד">
                    <i class="fas fa-pencil-alt"></i>
                </button>
            </div>
        </div>

        <div class="max-w-xl mx-auto mb-10 flex flex-col gap-4">
            <div class="relative">
                <i class="fas fa-search absolute right-4 top-3.5 text-slate-400"></i>
                <input type="text" id="search-input" placeholder="חיפוש מהיר בדשבורד הנוכחי..." 
                       class="w-full bg-slate-900/80 border border-slate-700 rounded-xl py-3 pr-12 pl-4 text-white placeholder-slate-500 focus:outline-none focus:border-accentBlue transition-colors shadow-inner">
            </div>
            
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                <button id="btn-add-tool" class="bg-accentBlue hover:bg-sky-600 text-white font-medium py-2.5 px-4 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2 text-sm sm:text-base">
                    <i class="fas fa-plus"></i> הוספת כלי חדש
                </button>
                <button id="btn-add-category" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 font-medium py-2.5 px-4 rounded-xl transition-all flex items-center justify-center gap-2 text-sm sm:text-base">
                    <i class="fas fa-folder-plus text-amber-500"></i> קטגוריה חדשה
                </button>
                <button id="btn-import-bookmarks" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 font-medium py-2.5 px-4 rounded-xl transition-all flex items-center justify-center gap-2 col-span-2 sm:col-span-1 text-sm sm:text-base">
                    <i class="fas fa-cog text-indigo-400"></i> גיבוי וייבוא סימניות
                </button>
            </div>
        </div>

        <div id="most-used-section" class="mb-10 hidden">
            <h3 class="text-lg font-medium text-slate-300 mb-4 flex items-center gap-2">
                <i class="fas fa-fire text-orange-500"></i> הכלים הנפוצים ביותר
            </h3>
            <div id="most-used-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                </div>
        </div>

        <div id="categories-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 min-h-[200px]">
            </div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        
        <div id="modal-category" class="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full p-6 shadow-2xl hidden transform scale-95 transition-transform duration-300">
            <h3 id="modal-category-title" class="text-xl font-bold text-accentBlue mb-6">יצירת קטגוריה חדשה</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">בחירת אייקון</label>
                    <div class="relative inline-block">
                        <button id="category-emoji-trigger" class="text-3xl bg-slate-800 border border-slate-700 p-3 rounded-xl hover:bg-slate-700 transition-colors">📁</button>
                        <div id="emoji-popover" class="absolute top-14 right-0 bg-slate-800 border border-slate-700 rounded-xl p-3 shadow-xl hidden grid grid-cols-6 gap-2 w-56 z-50 max-h-48 overflow-y-auto">
                            <span class="emoji-option cursor-pointer text-xl text-center p-1 hover:bg-slate-700 rounded">📁</span>
                            <span class="emoji-option cursor-pointer text-xl text-center p-1 hover:bg-slate-700 rounded">🛠️</span>
                            <span class="emoji-option cursor-pointer text-xl text-center p-1 hover:bg-slate-700 rounded">🚀</span>
                            <span class="emoji-option cursor-pointer text-xl text-center p-1 hover:bg-slate-700 rounded">📊</span>
                            <span class="emoji-option cursor-pointer text-xl text-center p-1 hover:bg-slate-700 rounded">🌐</span>
                            <span class="emoji-option cursor-pointer text-xl text-center p-1 hover:bg-slate-700 rounded">🔒</span>
                            <span class="emoji-option cursor-pointer text-xl text-center p-1 hover:bg-slate-700 rounded">🎨</span>
                            <span class="emoji-option cursor-pointer text-xl text-center p-1 hover:bg-slate-700 rounded">📝</span>
                            <span class="emoji-option cursor-pointer text-xl text-center p-1 hover:bg-slate-700 rounded">💻</span>
                            <span class="emoji-option cursor-pointer text-xl text-center p-1 hover:bg-slate-700 rounded">🤖</span>
                            <span class="emoji-option cursor-pointer text-xl text-center p-1 hover:bg-slate-700 rounded">📢</span>
                            <span class="emoji-option cursor-pointer text-xl text-center p-1 hover:bg-slate-700 rounded">🔗</span>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">שם הקטגוריה</label>
                    <input type="text" id="category-name" placeholder="למשל: כללי, פיתוח" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none focus:border-accentBlue">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">צבע קטגוריה</label>
                    <div id="color-palette" class="grid grid-cols-6 gap-2">
                        </div>
                </div>
                <div class="flex justify-end gap-3 pt-4">
                    <button id="btn-cancel-category" class="px-5 py-2 rounded-xl text-slate-400 hover:bg-slate-800 transition-colors">ביטול</button>
                    <button id="btn-save-category" class="bg-accentBlue hover:bg-sky-600 text-white font-medium px-5 py-2 rounded-xl transition-colors">צור קטגוריה</button>
                </div>
            </div>
        </div>

        <div id="modal-tool" class="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full p-6 shadow-2xl hidden transform scale-95 transition-transform duration-300">
            <h3 id="modal-tool-title" class="text-xl font-bold text-accentBlue mb-6">הוספת כלי חדש</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">שם הכלי</label>
                    <input type="text" id="tool-name" placeholder="למשל: גוגל אנליטיקס" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none focus:border-accentBlue">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">כתובת הקישור (URL)</label>
                    <input type="url" id="tool-url" placeholder="https://example.com" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none focus:border-accentBlue left-to-right text-left">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">קטגוריית יעד</label>
                    <select id="tool-category-select" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none focus:border-accentBlue">
                        </select>
                </div>
                <div class="flex justify-end gap-3 pt-4">
                    <button id="btn-cancel-tool" class="px-5 py-2 rounded-xl text-slate-400 hover:bg-slate-800 transition-colors">ביטול</button>
                    <button id="btn-save-tool" class="bg-accentBlue hover:bg-sky-600 text-white font-medium px-5 py-2 rounded-xl transition-colors">שמור כלי</button>
                </div>
            </div>
        </div>

        <div id="modal-import" class="bg-slate-900 border border-slate-800 rounded-2xl max-w-lg w-full p-6 shadow-2xl hidden transform scale-95 transition-transform duration-300">
            <h3 class="text-xl font-bold text-slate-100 mb-4 flex items-center gap-2">
                <i class="fas fa-file-import text-indigo-400"></i> ניהול נתונים וסימניות דפדפן
            </h3>
            <p class="text-sm text-slate-400 mb-6">באפשרותך לייבא קובץ סימניות שהופק מהדפדפן (HTML). המערכת תזהה את התיקיות הראשיות ותהפוך אותן אוטומטית לקטגוריות בדשבורד הנוכחי.</p>
            
            <div class="space-y-6">
                <div class="p-4 bg-slate-800/50 rounded-xl border border-slate-700">
                    <label class="block text-sm font-medium text-slate-300 mb-2">ייבוא מקובץ HTML של הדפדפן</label>
                    <input type="file" id="bookmarks-file-input" accept=".html" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 file:cursor-pointer">
                    <div id="import-folder-selector-container" class="mt-4 hidden">
                        <label class="block text-xs font-medium text-slate-400 mb-2">בחר אילו תיקיות ראשיות לייבא כאינטגרציה מלאה:</label>
                        <div id="import-folders-list" class="space-y-1.5 max-h-36 overflow-y-auto bg-slate-900 p-2.5 rounded-lg border border-slate-750">
                            </div>
                        <button id="btn-confirm-import-folders" class="mt-3 w-full bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-medium py-2 rounded-lg transition-colors">בצע ייבוא עבור התיקיות שנבחרו</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button id="btn-export-json" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 py-3 px-4 rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-download"></i> גיבוי נתונים (JSON)
                    </button>
                    <button id="btn-import-json-trigger" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 py-3 px-4 rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-upload"></i> שחזור מגיבוי (JSON)
                    </button>
                </div>
                <input type="file" id="json-file-input" accept=".json" class="hidden">
            </div>

            <div class="flex justify-end gap-3 pt-6 border-t border-slate-800 mt-6">
                <button id="btn-close-import" class="px-5 py-2 bg-slate-800 text-slate-300 rounded-xl hover:bg-slate-700 transition-colors w-full sm:w-auto">סגור</button>
            </div>
        </div>

        <div id="modal-dashboard" class="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full p-6 shadow-2xl hidden transform scale-95 transition-transform duration-300">
            <h3 id="modal-dashboard-title" class="text-xl font-bold text-accentPurple mb-6">עריכת הגדרות דשבורד</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">אימוג'י מייצג</label>
                    <input type="text" id="dashboard-icon-input" placeholder="🚀" class="w-12 text-center bg-slate-800 border border-slate-700 rounded-xl p-3 text-xl text-white focus:outline-none focus:border-accentPurple">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">שם הדשבורד</label>
                    <input type="text" id="dashboard-name-input" placeholder="שם הדשבורד" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none focus:border-accentPurple">
                </div>
                <div class="flex justify-end gap-3 pt-4">
                    <button id="btn-cancel-dashboard" class="px-5 py-2 rounded-xl text-slate-400 hover:bg-slate-800 transition-colors">ביטול</button>
                    <button id="btn-save-dashboard" class="bg-accentPurple hover:bg-purple-600 text-white font-medium px-5 py-2 rounded-xl transition-colors">שמור שינויים</button>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
