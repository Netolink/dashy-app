<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דשבורד הכלים שלי - Dashy SaaS</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Assistant', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            background-image: radial-gradient(circle at top left, rgba(56, 189, 248, 0.05), transparent 40%),
                              radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.05), transparent 40%);
            background-attachment: fixed;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Auth Top Bar */
        .auth-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .user-info { display: flex; align-items: center; gap: 0.75rem; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--accent); }

        /* Dashboard Tabs (Multi-Dashboard) */
        .dashboard-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            align-items: center;
        }

        .tab-btn {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--panel-border);
            color: var(--text-muted);
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #0f172a;
            border-color: var(--accent);
        }

        .tab-btn:hover:not(.active) {
            border-color: var(--accent);
            color: var(--text-main);
        }

        .add-dash-btn {
            background: transparent;
            border: 1px dashed var(--accent);
            color: var(--accent);
            padding: 0.4rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .add-dash-btn:hover { background: rgba(56, 189, 248, 0.1); }

        /* Header & Search */
        header { margin-bottom: 3rem; text-align: center; }
        header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 1.5rem; background: linear-gradient(to right, #38bdf8, #bae6fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-bar-container { max-width: 600px; margin: 0 auto 2rem auto; }
        .search-bar { width: 100%; padding: 1rem 1.5rem; border-radius: 50px; border: 1px solid var(--panel-border); background: var(--panel-bg); color: var(--text-main); font-size: 1.1rem; outline: none; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 4px 25px rgba(56, 189, 248, 0.2); }

        /* Actions */
        .actions-row { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn { background: var(--panel-bg); border: 1px solid var(--panel-border); color: var(--text-main); padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; transition: all 0.2s; }
        .btn:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        .btn-primary { background: var(--accent); color: #0f172a; border: none; }
        .btn-primary:hover { background: var(--accent-hover); color: #0f172a; }
        .btn-danger { color: var(--danger); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); border-color: var(--danger); }

        /* Settings Panel */
        .settings-panel { display: none; background: rgba(30, 41, 59, 0.9); border: 1px solid var(--panel-border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto; }
        .settings-grid { display: flex; flex-direction: column; gap: 1rem; }
        .settings-group { display: flex; align-items: center; justify-content: space-between; background: rgba(15, 23, 42, 0.4); padding: 0.75rem 1rem; border-radius: 8px; gap: 1rem; }
        .settings-info h4 { color: var(--accent); margin-bottom: 0.2rem; }
        .settings-info p { font-size: 0.85rem; color: var(--text-muted); }
        .file-input-label { background: var(--panel-bg); border: 1px solid var(--panel-border); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
        .hidden-file-input { display: none; }

        /* Grid */
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; }
        .category-card { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 16px; padding: 1.5rem; backdrop-filter: blur(8px); }
        .category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }
        .category-title { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
        .delete-cat-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; }
        .delete-cat-btn:hover { color: var(--danger); }
        .items-list { display: flex; flex-direction: column; gap: 0.75rem; }

        /* Items */
        .tool-item { display: flex; align-items: center; justify-content: space-between; background: rgba(15, 23, 42, 0.6); border: 1px solid transparent; padding: 0.75rem 1rem; border-radius: 10px; color: var(--text-main); transition: all 0.2s ease; }
        .tool-item:hover { border-color: rgba(56, 189, 248, 0.3); background: rgba(15, 23, 42, 0.9); transform: translateX(-4px); }
        .tool-link-area { display: flex; align-items: center; gap: 0.75rem; flex-grow: 1; text-decoration: none; color: inherit; }
        .tool-favicon { width: 24px; height: 24px; border-radius: 4px; background: #fff; padding: 2px; object-fit: contain; }
        .tool-name { font-weight: 600; font-size: 1rem; }
        .delete-item-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 0.2rem; border-radius: 4px; opacity: 0; transition: opacity 0.2s; }
        .tool-item:hover .delete-item-btn { opacity: 1; }
        .delete-item-btn:hover { color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e293b; border: 1px solid var(--panel-border); padding: 2rem; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .modal-header { font-size: 1.3rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--accent); }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .form-control { width: 100%; padding: 0.75rem 1rem; background: #0f172a; border: 1px solid var(--panel-border); border-radius: 8px; color: var(--text-main); outline: none; font-size: 1rem; }
        .form-control:focus { border-color: var(--accent); }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem; }

        /* עיצוב שורת בחירת קטגוריה עם כפתור הוספה מהירה */
        .category-select-row {
            display: flex;
            gap: 0.5rem;
        }
        .btn-inline-add {
            background: rgba(56, 189, 248, 0.1);
            border: 1px dashed var(--accent);
            color: var(--accent);
            padding: 0 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .btn-inline-add:hover {
            background: var(--accent);
            color: #0f172a;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="auth-bar">
            <div id="authStatusLeft">
                <span style="color: var(--text-muted); font-size: 0.9rem;">מצב: עבודה מקומית (אורח)</span>
            </div>
            <div id="authStatusRight">
                <button class="btn" onclick="loginWithGoogle()" style="color: var(--accent);">🌐 התחברות מהירה עם גוגל</button>
            </div>
        </div>

        <header>
            <h1>כלים דיגיטליים באתר</h1>
            
            <div class="dashboard-tabs" id="dashboardTabsArea">
                </div>
            
            <div class="search-bar-container">
                <input type="text" id="searchBar" class="search-bar" placeholder="חפש כלי מהיר בדשבורד הנוכחי...">
            </div>

            <div class="actions-row">
                <button class="btn btn-primary" onclick="openModal('itemModal')">➕ הוסף כלי חדש</button>
                <button class="btn" onclick="openModal('catModal')">📁 קטגוריה חדשה</button>
                <button class="btn" onclick="toggleSettings()">⚙️ גיבוי וייבוא סימניות</button>
                <button class="btn btn-danger" id="deleteDashBtn" onclick="deleteCurrentDashboard()" style="display:none;">🗑️ מחק דשבורד נוכחי</button>
            </div>

            <div id="settingsPanel" class="settings-panel">
                <div class="settings-grid">
                    <div class="settings-group">
                        <div class="settings-info">
                            <h4>גיבוי הדשבורד (JSON)</h4>
                            <p>הורד קובץ עם כל המידע הנוכחי למחשב.</p>
                        </div>
                        <button class="btn" onclick="exportDataJSON()" style="color: var(--accent);">📥 ייצא קובץ גיבוי</button>
                    </div>
                    <div class="settings-group">
                        <div class="settings-info">
                            <h4>שחזור דשבורד מגיבוי</h4>
                            <p>העלה קובץ גיבוי JSON ששמרת בעבר.</p>
                        </div>
                        <label class="file-input-label">
                            📤 בחר קובץ גיבוי
                            <input type="file" id="importJsonInput" class="hidden-file-input" accept=".json" onchange="importDataJSON(event)">
                        </label>
                    </div>
                    <div class="settings-group">
                        <div class="settings-info">
                            <h4>ייבוא סימניות מהדפדפן</h4>
                            <p>העלה קובץ HTML של Bookmarks שיש לך בדפדפן.</p>
                        </div>
                        <label class="file-input-label" style="border-color: var(--success); color: var(--success);">
                            🌐 ייבא קובץ Bookmarks
                            <input type="file" id="importBookmarksInput" class="hidden-file-input" accept=".html" onchange="importBookmarksHTML(event)">
                        </label>
                    </div>
                </div>
            </div>
        </header>

        <main class="categories-grid" id="categoriesGrid">
            </main>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">הוספת כלי חדש לדשבורד</div>
            <div class="form-group"><label>שם הכלי</label><input type="text" id="itemName" class="form-control" placeholder="למשל: Speed Insights"></div>
            <div class="form-group"><label>כתובת URL (לינק)</label><input type="url" id="itemUrl" class="form-control" placeholder="https://example.com" dir="ltr"></div>
            <div class="form-group">
                <label>בחר קטגוריה</label>
                <div class="category-select-row">
                    <select id="itemCategorySelect" class="form-control"></select>
                    <button class="btn-inline-add" title="צור קטגוריה חדשה מיד" onclick="openInlineCategoryCreate()">➕</button>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn" onclick="closeModal('itemModal')">ביטול</button>
                <button class="btn btn-primary" onclick="saveTool()">שמור כלי</button>
            </div>
        </div>
    </div>

    <div id="catModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">יצירת קטגוריה חדשה</div>
            <div class="form-group"><label>שם הקטגוריה</label><input type="text" id="catName" class="form-control" placeholder="למשל: כללי, פיתוח"></div>
            <div class="modal-buttons">
                <button class="btn" onclick="closeModal('catModal')">ביטול</button>
                <button class="btn btn-primary" onclick="saveCategory()">צור קטגוריה</button>
            </div>
        </div>
    </div>

    <div id="dashModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">יצירת דשבורד חדש</div>
            <div class="form-group"><label>שם הדשבורד</label><input type="text" id="newDashName" class="form-control" placeholder="למשל: עבודה, פרויקט אישי"></div>
            <div class="modal-buttons">
                <button class="btn" onclick="closeModal('dashModal')">ביטול</button>
                <button class="btn btn-primary" onclick="createNewDashboard()">צור דשבורד</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. הגדרות FIREBASE — תדביק כאן את שלך
        // ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyCcxyNvQa-kC-0KDdWKel-2IG9sMI3AuWs",
  authDomain: "my-dashy-app.firebaseapp.com",
  projectId: "my-dashy-app",
  storageBucket: "my-dashy-app.firebasestorage.app",
  messagingSenderId: "66095384503",
  appId: "1:66095384503:web:d0747e5c07169a7a6b0a32"
};

        let isFirebaseActive = false;
        if (firebaseConfig.apiKey && !firebaseConfig.apiKey.includes("YourKeyHere")) {
            firebase.initializeApp(firebaseConfig);
            isFirebaseActive = true;
        }

        const db = isFirebaseActive ? firebase.firestore() : null;
        const auth = isFirebaseActive ? firebase.auth() : null;

        // ==========================================
        // 2. ניהול המצב של האפליקציה (State)
        // ==========================================
        let currentUser = null;
        
        let allDashboards = [
            { id: "dash-default", title: "דשבורד ראשי", data: [
                { id: "cat-1", title: "כללי", items: [{ id: "t1", name: "Google", url: "https://google.com" }] }
            ]}
        ];
        let currentDashboardId = "dash-default";

        if (!isFirebaseActive && localStorage.getItem('dashy_all_dashboards')) {
            allDashboards = JSON.parse(localStorage.getItem('dashy_all_dashboards'));
            currentDashboardId = localStorage.getItem('dashy_current_id') || allDashboards[0].id;
        }

        async function saveData() {
            if (currentUser && isFirebaseActive) {
                await db.collection('users_dashboards').doc(currentUser.uid).set({
                    allDashboards: allDashboards,
                    currentDashboardId: currentDashboardId
                });
            } else {
                localStorage.setItem('dashy_all_dashboards', JSON.stringify(allDashboards));
                localStorage.setItem('dashy_current_id', currentDashboardId);
            }
        }

        // ==========================================
        // 3. מנגנון התחברות (Authentication)
        // ==========================================
        if (isFirebaseActive) {
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('authStatusLeft').innerHTML = `
                        <div class="user-info">
                            <img src="${user.photoURL}" class="user-avatar">
                            <span>מחובר כ: <strong>${user.displayName}</strong></span>
                        </div>
                    `;
                    document.getElementById('authStatusRight').innerHTML = `<button class="btn" onclick="logout()">התנתק</button>`;
                    
                    const doc = await db.collection('users_dashboards').doc(user.uid).get();
                    if (doc.exists) {
                        const cloudData = doc.data();
                        allDashboards = cloudData.allDashboards || allDashboards;
                        currentDashboardId = cloudData.currentDashboardId || allDashboards[0].id;
                    } else {
                        await saveData();
                    }
                } else {
                    currentUser = null;
                    document.getElementById('authStatusLeft').innerHTML = `<span style="color: var(--text-muted); font-size: 0.9rem;">מצב: עבודה מקומית (אורח)</span>`;
                    document.getElementById('authStatusRight').innerHTML = `<button class="btn" onclick="loginWithGoogle()" style="color: var(--accent);">🌐 התחברות מהירה עם גוגל</button>`;
                }
                renderTabs();
                renderDashboard();
            });
        }

        function loginWithGoogle() {
            if (!isFirebaseActive) return alert("אנא הגדר firebaseConfig תחילה.");
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("שגיאה בהתחברות: " + err.message));
        }

        function logout() { auth.signOut().then(() => window.location.reload()); }

        // ==========================================
        // 4. ניהול דשבורדים מרובים
        // ==========================================
        function renderTabs() {
            const tabsArea = document.getElementById('dashboardTabsArea');
            tabsArea.innerHTML = "";

            allDashboards.forEach(dash => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${dash.id === currentDashboardId ? 'active' : ''}`;
                btn.innerText = dash.title;
                btn.onclick = () => {
                    currentDashboardId = dash.id;
                    saveData(); renderTabs(); renderDashboard();
                };
                tabsArea.appendChild(btn);
            });

            const addBtn = document.createElement('button');
            addBtn.className = "add-dash-btn"; addBtn.innerText = "➕ דשבורד חדש";
            addBtn.onclick = () => openModal('dashModal');
            tabsArea.appendChild(addBtn);

            document.getElementById('deleteDashBtn').style.display = allDashboards.length > 1 ? 'block' : 'none';
        }

        function createNewDashboard() {
            const name = document.getElementById('newDashName').value.trim();
            if (!name) return alert("נא להזין שם");

            const newDash = {
                id: 'dash-' + Date.now(),
                title: name,
                data: [{ id: 'cat-' + Date.now(), title: "כללי", items: [] }] // יוצר אוטומטית קטגוריית "כללי" ראשונית למניעת באג ריק
            };

            allDashboards.push(newDash);
            currentDashboardId = newDash.id;
            saveData(); renderTabs(); renderDashboard(); closeModal('dashModal');
            document.getElementById('newDashName').value = "";
        }

        function deleteCurrentDashboard() {
            if (allDashboards.length <= 1) return;
            if (confirm("האם אתה בטוח שברצונך למחוק את כל הדשבורד הנוכחי?")) {
                allDashboards = allDashboards.filter(d => d.id !== currentDashboardId);
                currentDashboardId = allDashboards[0].id;
                saveData(); renderTabs(); renderDashboard();
            }
        }

        // ==========================================
        // 5. רנדור וניהול הכלים והקטגוריות
        // ==========================================
        function getCurrentDashboardData() {
            const activeDash = allDashboards.find(d => d.id === currentDashboardId);
            return activeDash ? activeDash.data : [];
        }

        function renderDashboard(searchTerm = "") {
            const grid = document.getElementById('categoriesGrid');
            const select = document.getElementById('itemCategorySelect');
            
            grid.innerHTML = "";
            select.innerHTML = "";

            const activeData = getCurrentDashboardData();

            activeData.forEach(category => {
                const option = document.createElement('option');
                option.value = category.id;
                option.text = category.title;
                select.appendChild(option);

                const filteredItems = category.items.filter(item => 
                    item.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    item.url.toLowerCase().includes(searchTerm.toLowerCase())
                );

                if (searchTerm && filteredItems.length === 0) return;

                const catCard = document.createElement('div');
                catCard.className = "category-card";

                const catHeader = document.createElement('div');
                catHeader.className = "category-header";
                catHeader.innerHTML = `
                    <div class="category-title">${category.title}</div>
                    <button class="delete-cat-btn" onclick="deleteCategory('${category.id}')">🗑️ מחק</button>
                `;
                catCard.appendChild(catHeader);

                const itemsList = document.createElement('div');
                itemsList.className = "items-list";

                filteredItems.forEach(item => {
                    let hostname = "google.com";
                    try { hostname = new URL(item.url).hostname; } catch(e) {}
                    const faviconUrl = `https://www.google.com/s2/favicons?sz=64&domain=${hostname}`;

                    const itemElement = document.createElement('div');
                    itemElement.className = "tool-item";
                    itemElement.innerHTML = `
                        <a href="${item.url}" target="_blank" class="tool-link-area">
                            <img src="${faviconUrl}" class="tool-favicon" onerror="this.src='https://www.google.com/s2/favicons?sz=64&domain=google.com'">
                            <span class="tool-name">${item.name}</span>
                        </a>
                        <button class="delete-item-btn" onclick="deleteItem('${category.id}', '${item.id}')">🗑️</button>
                    `;
                    itemsList.appendChild(itemElement);
                });

                catCard.appendChild(itemsList);
                grid.appendChild(catCard);
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function toggleSettings() { const p = document.getElementById('settingsPanel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

        function saveCategory() {
            const name = document.getElementById('catName').value.trim();
            if (!name) return alert("אנא הזן שם");
            
            getCurrentDashboardData().push({ id: 'cat-' + Date.now(), title: name, items: [] });
            saveData(); renderDashboard(); closeModal('catModal');
            document.getElementById('catName').value = "";
        }

        // פיצ'ר חדש: הוספת קטגוריה מהירה ישירות מתוך פופאפ הכלי
        function openInlineCategoryCreate() {
            const name = prompt("הזן שם עבור הקטגוריה החדשה:");
            if (!name || !name.trim()) return;
            
            const newCatId = 'cat-' + Date.now();
            getCurrentDashboardData().push({ id: newCatId, title: name.trim(), items: [] });
            
            saveData();
            renderDashboard();
            
            // עדכון ה-select הפנימי ובחירה אוטומטית בקטגוריה שנוצרה כעת
            document.getElementById('itemCategorySelect').value = newCatId;
        }

        function saveTool() {
            const name = document.getElementById('itemName').value.trim();
            let url = document.getElementById('itemUrl').value.trim();
            const catId = document.getElementById('itemCategorySelect').value;

            if (!catId) {
                alert("אין קטגוריה קיימת בדשבורד! לחץ על כפתור ה-➕ שליד השדה כדי ליצור אחת תחילה.");
                return;
            }
            if (!name || !url) return alert("נא למלא שם וכתובת אתר");
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            const category = getCurrentDashboardData().find(c => c.id === catId);
            if (category) {
                category.items.push({ id: 'tool-' + Date.now(), name: name, url: url });
                saveData(); renderDashboard(); closeModal('itemModal');
                document.getElementById('itemName').value = "";
                document.getElementById('itemUrl').value = "";
            }
        }

        function deleteItem(catId, itemId) {
            const category = getCurrentDashboardData().find(c => c.id === catId);
            if (category) {
                category.items = category.items.filter(i => i.id !== itemId);
                saveData(); renderDashboard();
            }
        }

        // חוק 1 המעודכן: הגנה מפני מחיקת הקטגוריה האחרונה
        function deleteCategory(catId) {
            const activeData = getCurrentDashboardData();
            
            if (activeData.length <= 1) {
                alert("⚠️ אבטחת מערכת: לא ניתן למחוק את הקטגוריה האחרונה שנשארה בדשבורד. חייב להישאר מרחב עבודה אחד לפחות.");
                return;
            }

            if (confirm("האם למחוק קטגוריה זו ואת כל הכלים שבתוכה?")) {
                const activeDash = allDashboards.find(d => d.id === currentDashboardId);
                if (activeDash) {
                    activeDash.data = activeDash.data.filter(c => c.id !== catId);
                    saveData(); renderDashboard();
                }
            }
        }

        // ==========================================
        // 6. גיבויים וייבוא סימניות
        // ==========================================
        function exportDataJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(allDashboards, null, 2));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "dashy_saas_backup.json");
            document.body.appendChild(dl); dl.click(); dl.remove();
        }

        function importDataJSON(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        allDashboards = imported;
                        currentDashboardId = allDashboards[0].id;
                        saveData(); renderTabs(); renderDashboard();
                        alert("הנתונים שוחזרו!"); toggleSettings();
                    }
                } catch (err) { alert("קובץ לא תקין"); }
            };
            reader.readAsText(file);
        }

        function importBookmarksHTML(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const doc = new DOMParser().parseFromString(e.target.result, 'text/html');
                const links = doc.querySelectorAll('a');
                const importedItems = [];
                links.forEach(link => {
                    const name = link.textContent.trim(); const url = link.getAttribute('href');
                    if (url && url.startsWith('http')) {
                        importedItems.push({ id: 'tool-' + Math.random().toString(36).substr(2,9), name: name || url, url: url });
                    }
                });
                if (importedItems.length > 0) {
                    getCurrentDashboardData().push({ id: 'cat-' + Date.now(), title: "סימניות מיובאות (" + importedItems.length + ")", items: importedItems });
                    saveData(); renderDashboard(); alert(`ייבאנו ${importedItems.length} סימניות!`); toggleSettings();
                }
            };
            reader.readAsText(file);
        }

        document.getElementById('searchBar').addEventListener('input', (e) => renderDashboard(e.target.value));

        renderTabs();
        renderDashboard();
    </script>
</body>
</html>
